<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cris Analytic</title>
    <meta
      name="description"
      content="Cris Analytic. Sitio web simple publicado con GitHub Pages."
    >
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f3ee;
        --card: rgba(255, 255, 255, 0.82);
        --text: #1f2937;
        --muted: #5b6472;
        --accent: #b85c38;
        --line: rgba(31, 41, 55, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(184, 92, 56, 0.16), transparent 34%),
          linear-gradient(180deg, #fbf8f3 0%, var(--bg) 100%);
        padding: 24px;
      }

      main {
        width: min(720px, 100%);
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 48px 32px;
        box-shadow: 0 24px 60px rgba(31, 41, 55, 0.08);
        backdrop-filter: blur(10px);
      }

      .eyebrow {
        margin: 0 0 12px;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        font: 600 0.78rem/1.2 Arial, sans-serif;
        color: var(--accent);
      }

      h1 {
        margin: 0;
        font-size: clamp(2.4rem, 8vw, 4.8rem);
        line-height: 0.95;
      }

      p {
        margin: 20px 0 0;
        max-width: 42ch;
        font: 400 1.05rem/1.7 Arial, sans-serif;
        color: var(--muted);
      }

      a {
        color: inherit;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">crisanalytic.com</p>
      <h1>Cris Analytic</h1>
      <p>
        Sitio inicial publicado con GitHub Pages. Este espacio ya queda listo
        para conectarse al dominio personalizado y crecer desde una base mínima.
      </p>
    </main>
  </body>
</html>
